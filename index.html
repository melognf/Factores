<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cálculo de Bebida</title>

  <link rel="stylesheet" href="estilos.css" />
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <meta name="theme-color" content="#e10600">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Calculo Bebida">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar liquid-header">
      <div class="liquid-bg">
        <svg class="liquid-svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
          <path id="wave1" d="M0,160L48,149.3C96,139,192,117,288,122.7C384,128,480,160,576,176C672,192,768,192,864,170.7C960,149,1056,107,1152,101.3C1248,96,1344,128,1392,144L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>

          <path id="wave2" d="M0,224L48,213.3C96,203,192,181,288,165.3C384,149,480,139,576,149.3C672,160,768,192,864,202.7C960,213,1056,203,1152,186.7C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>

          <path id="wave3" d="M0,256L48,245.3C96,235,192,213,288,208C384,203,480,213,576,224C672,235,768,245,864,234.7C960,224,1056,192,1152,186.7C1248,181,1344,203,1392,213.3L1440,224L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
      </div>

      <div class="topbar-content">
        <h1>Cálculo de Bebida</h1>
        <p>Jarabe · Factor · Formato</p>
      </div>
    </header>

    <main class="card">
      <div class="campo">
        <label for="bebida">Bebida</label>
        <select id="bebida">
          <option value="" selected disabled>Seleccionar bebida</option>
        </select>
      </div>

      <div class="campo">
        <label for="jarabe">Litros de jarabe</label>
        <input
          type="text"
          id="jarabe"
          inputmode="decimal"
          autocomplete="off"
          placeholder="Ej: 120"
        />
      </div>

      <div class="campo">
        <label for="formato">Formato (litros por envase)</label>
        <input
          type="text"
          id="formato"
          inputmode="decimal"
          autocomplete="off"
          placeholder="Ej: 0.354 / 0.995 / 1.25"
        />
        <small>500 ml = 0.5 | 354 ml = 0.354 | 995 ml = 0.995 | 1,25 L = 1.25</small>
      </div>

      <div class="campo readonly">
        <label for="factor">Factor de rendimiento</label>
        <input type="text" id="factor" readonly />
      </div>

      <div class="acciones">
        <button id="btnCalcular" class="btn" type="button">Calcular</button>
        <button id="btnLimpiar" class="btn btn-secundario" type="button">Limpiar</button>
      </div>

      <section class="resultado" id="resultado">
        <div class="resultado-vacio">Completá los datos para calcular.</div>
      </section>

      <div id="fxBurst" class="fx-burst" aria-hidden="true"></div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .catch(err => console.log("SW error:", err));
      });
    }
  </script>
</body>
</html>
